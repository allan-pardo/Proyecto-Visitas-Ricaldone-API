<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Visitas - ITR</title>
    <link rel="shortcut icon" href="./img/logoRicaldone.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">

</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-sm-10">
                <div class="card shadow border-1">
                    <div class="card-body p-5 text-center">
                        <h3 class="fw-bold mb-4">BIENVENIDO AL<br>CONTROL DE VISITAS - ITR</h3>
                        
                        <div class="mb-4">
                            <img src="img/logoRicaldone.png" alt="Logo Ricaldone" class="img-fluid rounded" style="max-height: 180px;">
                        </div>

                        <form id="loginForm">
                        <div class="mb-3">
                            <input type="email" class="form-control form-control-lg text-white border-0 py-3 custom-placeholder" 
                            placeholder="Correo" required style="background-color: #1F2937;">
                            </div>
                            <div class="mb-4">
                            <input type="password" class="form-control form-control-lg text-white border-0 py-3 custom-placeholder" 
                            placeholder="Contraseña" required style="background-color: #1F2937;">
                            </div>

                            <button type="submit" class="btn btn-lg w-100 py-3 text-white rounded-3" style="background-color: #1F2937; border: none;">
                                Iniciar Sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JavaScript/Script.js"></script>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Iniciando sesión...");
        });
    </script>
</body>
</html>
