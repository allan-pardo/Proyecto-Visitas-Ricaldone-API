<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Visitas - ITR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-sm-10">
                <div class="card shadow border-1">
                    <div class="card-body p-5 text-center">
                        <h3 class="fw-bold mb-4">BIENVENIDO AL<br>CONTROL DE VISITAS - ITR</h3>
                        
                        <div class="mb-4">
                            <img src="./img/logo ricaldone 2.png" alt="Logo Ricaldone" class="img-fluid rounded" style="max-height: 180px;">
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <input type="email" class="form-control form-control-lg bg-dark text-light border-0 py-3" 
                                       placeholder="CORREO" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" class="form-control form-control-lg bg-dark text-light border-0 py-3" 
                                       placeholder="CONTRASEÑA" required>
                            </div>
                            <button type="submit" class="btn btn-secondary btn-lg w-100 py-3">
                                INICIAR SESIÓN
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Iniciando sesión...");
        });
    </script>
</body>
</html>
